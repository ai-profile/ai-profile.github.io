name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docusaurus_project/package-lock.json

      - name: Install dependencies
        working-directory: ./docusaurus_project
        run: npm ci

      - name: Build Docusaurus
        working-directory: ./docusaurus_project
        run: npm run build

      - name: Prepare Deployment Directory
        run: |
          mkdir -p dist/notes
          cp index.html dist/
          # Copy any other root assets if they exist (except docusaurus_project)
          # cp styles.css dist/ 2>/dev/null || true
          cp -r docusaurus_project/build/* dist/notes/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
